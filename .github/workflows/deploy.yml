name: Server - Build & Deploy (v2 Test)

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'agent/**'
      - 'mobile/**'
      - '**.md'
  workflow_dispatch:

env:
  VPS_HOST: ${{ secrets.VPS_HOST }}
  VPS_USER: ${{ secrets.VPS_USER }}
  VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
  NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
  NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}
  NEXT_PUBLIC_WEBRTC_ICE_SERVERS: ${{ secrets.NEXT_PUBLIC_WEBRTC_ICE_SERVERS }}
  NEXT_PUBLIC_AGENT_DOWNLOAD_URL: ${{ secrets.NEXT_PUBLIC_AGENT_DOWNLOAD_URL }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          test -n "$VPS_HOST" || { echo "VPS_HOST is missing"; exit 1; }
          test -n "$VPS_USER" || { echo "VPS_USER is missing"; exit 1; }
          test -n "$VPS_SSH_KEY" || { echo "VPS_SSH_KEY is missing"; exit 1; }
          test -n "$NEXT_PUBLIC_API_URL" || { echo "NEXT_PUBLIC_API_URL is missing"; exit 1; }
          test -n "$NEXT_PUBLIC_WS_URL" || { echo "NEXT_PUBLIC_WS_URL is missing"; exit 1; }

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ env.VPS_SSH_KEY }}
          known_hosts: ${{ env.VPS_HOST }}
          if_key_exists: replace

      - name: Build and deploy via SSH
        run: |
          # scp the deploy script and execute it remotely
          # (avoids YAML heredoc conflict by keeping bash heredocs in a separate file)
          scp -o StrictHostKeyChecking=no scripts/deploy-remote.sh "$VPS_USER@$VPS_HOST:/tmp/deploy-remote.sh"
          ssh -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" \
            "bash /tmp/deploy-remote.sh \
              '$NEXT_PUBLIC_API_URL' \
              '$NEXT_PUBLIC_WS_URL' \
              '$NEXT_PUBLIC_WEBRTC_ICE_SERVERS' \
              '$NEXT_PUBLIC_AGENT_DOWNLOAD_URL'"
          ssh -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" "rm /tmp/deploy-remote.sh"