name: Server - Build & Deploy (v2 Test)

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'agent/**'
      - 'mobile/**'
      - '**.md'
  workflow_dispatch:

env:
  VPS_HOST: ${{ secrets.VPS_HOST }}
  VPS_USER: ${{ secrets.VPS_USER }}
  VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
  NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
  NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}
  NEXT_PUBLIC_WEBRTC_ICE_SERVERS: ${{ secrets.NEXT_PUBLIC_WEBRTC_ICE_SERVERS }}
  NEXT_PUBLIC_AGENT_DOWNLOAD_URL: ${{ secrets.NEXT_PUBLIC_AGENT_DOWNLOAD_URL }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          test -n "$VPS_HOST" || { echo "VPS_HOST is missing"; exit 1; }
          test -n "$VPS_USER" || { echo "VPS_USER is missing"; exit 1; }
          test -n "$VPS_SSH_KEY" || { echo "VPS_SSH_KEY is missing"; exit 1; }
          test -n "$NEXT_PUBLIC_API_URL" || { echo "NEXT_PUBLIC_API_URL is missing"; exit 1; }
          test -n "$NEXT_PUBLIC_WS_URL" || { echo "NEXT_PUBLIC_WS_URL is missing"; exit 1; }

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ env.VPS_SSH_KEY }}
          known_hosts: ${{ env.VPS_HOST }}
          if_key_exists: replace

      - name: Build and deploy via SSH
        run: |
          API_ARG=$(printf '%q' "$NEXT_PUBLIC_API_URL")
          WS_ARG=$(printf '%q' "$NEXT_PUBLIC_WS_URL")
          ICE_ARG=$(printf '%q' "$NEXT_PUBLIC_WEBRTC_ICE_SERVERS")
          AGENT_DOWNLOAD_ARG=$(printf '%q' "$NEXT_PUBLIC_AGENT_DOWNLOAD_URL")

          ssh -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" << DEPLOY
            cd /root/teamlens/teamlens-web-server-v2
            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Rebuilding Go backend ==="
            cd backend-go
            docker build -t teamlens-api-go:latest .
            docker rm -f teamlens-api-go-test 2>/dev/null
            docker run -d --name teamlens-api-go-test --restart unless-stopped \
              --network teamlens-web-server_default \
              -p 5002:5000 \
              -v /root/teamlens/teamlens-web-server/uploads:/app/uploads \
              --env-file .env \
              teamlens-api-go:latest

            echo "=== Rebuilding WebSocket ==="
            cd ../backend-ws
            docker build -t teamlens-ws:latest .
            docker rm -f teamlens-ws-test 2>/dev/null
            docker run -d --name teamlens-ws-test --restart unless-stopped \
              --network teamlens-web-server_default \
              -p 4001:4000 \
              --env-file .env \
              teamlens-ws:latest

            echo "=== Rebuilding Frontend ==="
            cd ../frontend
            docker build -t teamlens-frontend-v2:test \
              --build-arg NEXT_PUBLIC_API_URL=$API_ARG \
              --build-arg NEXT_PUBLIC_WS_URL=$WS_ARG \
              --build-arg NEXT_PUBLIC_WEBRTC_ICE_SERVERS=$ICE_ARG \
              --build-arg NEXT_PUBLIC_AGENT_DOWNLOAD_URL=$AGENT_DOWNLOAD_ARG \
              .
            docker rm -f teamlens-frontend-v2-test 2>/dev/null
            docker run -d --name teamlens-frontend-v2-test --restart unless-stopped \
              --network teamlens-web-server_default \
              -p 3002:3000 \
              teamlens-frontend-v2:test

            echo "=== Nginx reload ==="
            nginx -s reload
            echo "=== Deployment complete ==="
DEPLOY
