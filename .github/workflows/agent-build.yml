name: Agent - Build & Release

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - 'agent/**'
  workflow_dispatch:

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
  AGENT_VITE_API_URL: ${{ secrets.AGENT_VITE_API_URL }}
  AGENT_VITE_WEB_URL: ${{ secrets.AGENT_VITE_WEB_URL }}

concurrency:
  group: agent-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: windows
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    defaults:
      run:
        working-directory: agent

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: agent/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent/src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app (release)
        shell: bash
        run: |
          npm run tauri:release
          # Generate updater JSON (Tauri v2 only creates .sig files, not the JSON)
          echo "Generating updater JSON..."
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "App version: $VERSION"
          
          # Read MSI signature
          MSI_SIG=$(cat src-tauri/target/release/bundle/msi/*.msi.sig 2>/dev/null)
          NSIS_SIG=$(cat src-tauri/target/release/bundle/nsis/*.exe.sig 2>/dev/null)
          
          python3 -c "
import json, os, datetime, glob, re

with open('package.json') as f:
    ver = re.search(r'\"version\":\s*\"([^\"]+)\"', f.read()).group(1)

R = '${{ github.run_number }}'

# Read NSIS signature
sig_dir = 'src-tauri/target/release/bundle/nsis'
sig_files = glob.glob(sig_dir + '/*.exe.sig')
sig = ''
if sig_files:
    with open(sig_files[0]) as f:
        sig = f.read().strip()

data = {
    'version': ver,
    'notes': 'TeamLens Desktop Agent - Build #' + str(R),
    'pub_date': datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
    'platforms': {
        'windows-x86_64': {
            'signature': sig,
            'url': 'https://github.com/teamlens-co/teamlens-web-server/releases/download/agent-v' + str(R) + '/TeamLens_' + ver + '_x64-setup.exe'
        }
    }
}

with open('src-tauri/target/release/teamlens-agent-latest.json', 'w') as f:
    json.dump(data, f, indent=2)

print('✅ Generated updater JSON')
print(json.dumps(data, indent=2))
"
          cp src-tauri/target/release/teamlens-agent-latest.json src-tauri/target/release/bundle/
          
          echo "✅ Generated updater JSON"
          cat src-tauri/target/release/teamlens-agent-latest.json
          cp src-tauri/target/release/teamlens-agent-latest.json src-tauri/target/release/bundle/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: agent/src-tauri/target/release/bundle/
          retention-days: 7

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release-files
          find artifacts -type f | while read f; do cp "$f" release-files/; done
          echo "=== Release files ==="
          ls -la release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/**
          tag_name: agent-v${{ github.run_number }}
          body: |
            ## TeamLens Desktop Agent
            
            **Build:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            
            Auto-release from main branch push.
            Agents will auto-update within 6 hours.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
