version: "3.8"

services:
  # ── Database ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: teamlens-postgres-v2
    restart: unless-stopped
    environment:
      POSTGRES_USER: teamlens
      POSTGRES_PASSWORD: teamlens
      POSTGRES_DB: teamlens
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamlens -d teamlens"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Go REST API ───────────────────────────────────────────────────────
  backend-go:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: teamlens-api-go
    restart: unless-stopped
    # Port exposed for direct access (or route through nginx)
    expose:
      - "8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://teamlens:teamlens@postgres:5432/teamlens"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      WEB_APP_URL: "http://localhost:3000"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173,http://localhost:8081,http://localhost:80"
      UPLOAD_DIR: "/app/uploads"
      GOOGLE_PLACES_API_KEY: "${GOOGLE_PLACES_API_KEY:-}"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  # ── Node WebSocket (Socket.IO) ────────────────────────────────────────
  backend-ws:
    build:
      context: ./backend-ws
      dockerfile: Dockerfile
    container_name: teamlens-ws
    restart: unless-stopped
    expose:
      - "4000"
    environment:
      PORT: "4000"
      DATABASE_URL: "postgres://teamlens:teamlens@postgres:5432/teamlens"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      WEBRTC_ICE_SERVERS: "${WEBRTC_ICE_SERVERS:-[]}"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend (Next.js) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost/api}"
        NEXT_PUBLIC_WEBRTC_ICE_SERVERS: "${WEBRTC_ICE_SERVERS:-[]}"
    container_name: teamlens-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost/api}"
      NEXT_PUBLIC_WEBRTC_ICE_SERVERS: "${WEBRTC_ICE_SERVERS:-[]}"
      AGENT_DOWNLOAD_URL: "${AGENT_DOWNLOAD_URL:-}"
      NODE_ENV: "${NODE_ENV:-production}"
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      - backend-go
      - backend-ws

  # ── Nginx Gateway ─────────────────────────────────────────────────────
  gateway:
    image: nginx:alpine
    container_name: teamlens-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-go
      - backend-ws
      - frontend

volumes:
  postgres_data:
  uploads_data:
