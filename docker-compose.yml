services:
  # ── Database ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: teamlens-postgres-v2
    restart: unless-stopped
    environment:
      POSTGRES_USER: teamlens
      POSTGRES_PASSWORD: teamlens
      POSTGRES_DB: teamlens
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamlens -d teamlens"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Go REST API ───────────────────────────────────────────────────────
  backend-go:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: teamlens-api-go
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      DATABASE_URL: "postgres://teamlens:teamlens@postgres:5432/teamlens"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      JWT_ACCESS_TTL: "${JWT_ACCESS_TTL:-12h}"
      WEB_APP_URL: "http://localhost:3000"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:1420"
      UPLOAD_DIR: "/app/uploads"
      GOOGLE_PLACES_API_KEY: "${GOOGLE_PLACES_API_KEY:-}"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  # ── Node WebSocket (Socket.IO) ────────────────────────────────────────
  backend-ws:
    build:
      context: ./backend-ws
      dockerfile: Dockerfile
    container_name: teamlens-ws
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      DATABASE_URL: "postgres://teamlens:teamlens@postgres:5432/teamlens"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      WEBRTC_ICE_SERVERS: "${WEBRTC_ICE_SERVERS:-[]}"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:1420"
    depends_on:
      postgres:
        condition: service_healthy

  # -- Screenshot AI sidecar -------------------------------------------------
  screenshot-ai:
    build:
      context: ./screenshot-ai
      dockerfile: Dockerfile
    container_name: teamlens-screenshot-ai
    restart: unless-stopped
    ports:
      - "5055:5055"
    environment:
      DATABASE_URL: "postgres://teamlens:teamlens@postgres:5432/teamlens"
      UPLOAD_DIR: "/app/uploads"
      SQLITE_PATH: "/app/data/screenshot_ai.sqlite3"
      REPORT_OUTPUT_DIR: "/app/reports"
      SUMMARY_HTTP_HOST: "0.0.0.0"
      SUMMARY_HTTP_PORT: "5055"
      KIMI_API_MODE: "${KIMI_API_MODE:-openai}"
      KIMI_API_BASE_URL: "${KIMI_API_BASE_URL:-}"
      KIMI_GATEWAY_ID: "${KIMI_GATEWAY_ID:-}"
      KIMI_API_KEY: "${KIMI_API_KEY:-}"
      KIMI_MODEL: "${KIMI_MODEL:-kimi-2.6}"
      KIMI_TIMEOUT_SECONDS: "${KIMI_TIMEOUT_SECONDS:-120}"
      KIMI_MAX_RETRIES: "${KIMI_MAX_RETRIES:-3}"
      KIMI_MAX_TOKENS: "${KIMI_MAX_TOKENS:-4096}"
      POLL_INTERVAL_SECONDS: "${POLL_INTERVAL_SECONDS:-60}"
      REPORT_TIME_LOCAL: "${REPORT_TIME_LOCAL:-18:00}"
      ANALYSIS_SAMPLE_STABLE_MINUTES: "${ANALYSIS_SAMPLE_STABLE_MINUTES:-5}"
      SCREENSHOT_LOOKBACK_HOURS: "${SCREENSHOT_LOOKBACK_HOURS:-24}"
      SCREENSHOT_BATCH_LIMIT: "${SCREENSHOT_BATCH_LIMIT:-200}"
      MAX_IMAGE_WIDTH: "${MAX_IMAGE_WIDTH:-896}"
      JPEG_QUALITY: "${JPEG_QUALITY:-60}"
      PERIODIC_INTERVAL_MINUTES: "${PERIODIC_INTERVAL_MINUTES:-30}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    volumes:
      - uploads_data:/app/uploads:ro
      - ./screenshot-ai/data:/app/data
      - ./screenshot-ai/reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy

  # -- Alert service ---------------------------------------------------------
  alert-service:
    build:
      context: ./alert-service
      dockerfile: Dockerfile
    container_name: teamlens-alert-service
    restart: unless-stopped
    ports:
      - "5057:5057"
    environment:
      PORT: "5057"
      DATABASE_URL: "postgres://teamlens:teamlens@postgres:5432/teamlens?sslmode=disable"
      SQLITE_PATH: "/app/data/screenshot_ai.sqlite3"
      CHECK_INTERVAL: "${ALERT_CHECK_INTERVAL:-60s}"
      ORG_ID: "${ALERT_DEFAULT_ORG_ID:-}"
    volumes:
      - ./screenshot-ai/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      screenshot-ai:
        condition: service_started

  # ── Frontend (Next.js) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:5000}"
        NEXT_PUBLIC_WS_URL: "${NEXT_PUBLIC_WS_URL:-http://localhost:4000}"
        NEXT_PUBLIC_WEBRTC_ICE_SERVERS: "${WEBRTC_ICE_SERVERS:-[]}"
        NEXT_PUBLIC_ALERT_WS_URL: "${NEXT_PUBLIC_ALERT_WS_URL:-ws://localhost:5057/ws}"
    container_name: teamlens-frontend
    restart: unless-stopped
    expose:
      - "3000"
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:5000}"
      NEXT_PUBLIC_WS_URL: "${NEXT_PUBLIC_WS_URL:-http://localhost:4000}"
      NEXT_PUBLIC_WEBRTC_ICE_SERVERS: "${WEBRTC_ICE_SERVERS:-[]}"
      AGENT_DOWNLOAD_URL: "${AGENT_DOWNLOAD_URL:-}"
      SCREENSHOT_AI_REPORT_DIR: "/app/screenshot-ai/reports"
      SCREENSHOT_AI_URL: "${SCREENSHOT_AI_URL:-http://screenshot-ai:5055}"
      ALERT_SERVICE_URL: "${ALERT_SERVICE_URL:-http://alert-service:5057}"
      NEXT_PUBLIC_ALERT_WS_URL: "${NEXT_PUBLIC_ALERT_WS_URL:-ws://localhost:5057/ws}"
      NODE_ENV: "${NODE_ENV:-production}"
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./screenshot-ai/reports:/app/screenshot-ai/reports:ro
    depends_on:
      - backend-go
      - backend-ws
      - screenshot-ai
      - alert-service

  # ── Nginx Gateway ─────────────────────────────────────────────────────
  gateway:
    image: nginx:alpine
    container_name: teamlens-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-go
      - backend-ws
      - frontend
      - alert-service

volumes:
  postgres_data:
  uploads_data:
