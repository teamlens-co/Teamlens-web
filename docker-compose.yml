services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-teamlens}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-teamlens_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-teamlens}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${DB_USER:-teamlens}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-teamlens_db}?schema=public
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-teamlens}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-teamlens_db}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      AGENT_TOKEN_TTL_HOURS: ${AGENT_TOKEN_TTL_HOURS:-24}
      INVITE_TTL_HOURS: ${INVITE_TTL_HOURS:-168}
      WEB_APP_URL: ${WEB_APP_URL:-http://localhost:3000}
      PORT: 5000
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
