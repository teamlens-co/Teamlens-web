name: Agent - Build & Release

on:
  push:
    branches:
      - main
    paths:
      - 'agent/**'
  workflow_dispatch:

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            artifact: "teamlens-desktop-agent_*.AppImage"
            artifactName: linux
          - os: windows-latest
            target: windows
            artifact: "teamlens-desktop-agent_*.msi"
            artifactName: windows
          - os: macos-latest
            target: macos
            artifact: "teamlens-desktop-agent_*.dmg"
            artifactName: macos

    defaults:
      run:
        working-directory: agent

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agent/package-lock.json

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app (release with updater artifacts)
        run: npm run tauri:release
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          AGENT_VITE_API_URL: ${{ secrets.AGENT_VITE_API_URL }}
          AGENT_VITE_WEB_URL: ${{ secrets.AGENT_VITE_WEB_URL }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}-build
          path: |
            agent/src-tauri/target/release/bundle/**/*.${{ matrix.artifactName == 'linux' && 'AppImage' || matrix.artifactName == 'windows' && 'msi' || 'dmg' }}
            agent/src-tauri/target/release/teamlens-agent-latest.json
          retention-days: 7

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Find all release files
        run: |
          mkdir -p release-files
          find artifacts -type f | while read f; do
            cp "$f" release-files/
          done
          ls -la release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/**
          tag_name: agent-v${{ github.run_number }}
          body: |
            ## TeamLens Desktop Agent - Auto Release
            
            **Build:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            
            This release was automatically built from the main branch.
            
            Agents will auto-update within 6 hours.
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
